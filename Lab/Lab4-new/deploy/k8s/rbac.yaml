apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab4-state
  namespace: lab4
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab4-state
  namespace: lab4
subjects:
  - kind: ServiceAccount
    name: lab4-runner
    namespace: lab4
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lab4-state
