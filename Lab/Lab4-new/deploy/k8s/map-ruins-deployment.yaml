apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab4-map-ruins
  namespace: lab4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab4-map-ruins
  template:
    metadata:
      labels:
        app: lab4-map-ruins
      annotations:
        controller.kubernetes.io/pod-deletion-cost: "-1000"
        lab4/active-players: "0"
        lab4/draining: "false"
    spec:
      serviceAccountName: lab4-runner
      terminationGracePeriodSeconds: 240
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: lab4-map-ruins
      containers:
        - name: map
          image: lab4/map:local
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: LAB4_NAMESPACE
              value: "lab4"
            - name: LAB4_STATE_BACKEND
              value: "redis"
            - name: LAB4_REDIS_ADDR
              value: "lab4-redis:6379"
            - name: LAB4_REDIS_PREFIX
              value: "lab4"
            - name: LAB4_PRESTOP_DELAY
              value: "8s"
            - name: LAB4_MAP_DRAIN_TIMEOUT
              value: "180s"
            - name: LAB4_COMPONENT
              value: "map-ruins"
            - name: LAB4_MAP_ID
              value: "ruins"
            - name: LAB4_NODE_ID
              value: "map-ruins"
            - name: LAB4_MAP_LISTEN_ADDR
              value: ":9400"
          ports:
            - containerPort: 9400
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9400
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9400
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 9400
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
