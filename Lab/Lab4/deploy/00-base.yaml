apiVersion: v1
kind: Namespace
metadata:
  name: lab4
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab4-sa
  namespace: lab4
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-patcher
  namespace: lab4
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab4-sa-binding
  namespace: lab4
subjects:
- kind: ServiceAccount
  name: lab4-sa
  namespace: lab4
roleRef:
  kind: Role
  name: pod-patcher
  apiGroup: rbac.authorization.k8s.io
