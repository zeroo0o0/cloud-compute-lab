# Phase 2: 游戏节点有状态集
apiVersion: v1
kind: ConfigMap
metadata:
  name: battleworld-node-config
  namespace: battleworld
data:
  ROLE: "node"
  NODE_ADDR: "0.0.0.0:9311"
  MAP_ASSIGNMENTS: "green=node-a:node-c,cave=node-b:node-c,ruins=node-a:node-b"
  LAB3_DATA_ROOT: "/data"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: battleworld-node
  namespace: battleworld
  labels:
    role: game-node
spec:
  serviceName: battleworld-nodes
  replicas: 3
  selector:
    matchLabels:
      role: game-node
  template:
    metadata:
      labels:
        role: game-node
    spec:
      containers:
        - name: node
          image: battleworld:latest
          imagePullPolicy: Never
          command: ["node"]
          ports:
            - containerPort: 9311
              name: node-rpc
          envFrom:
            - configMapRef:
                name: battleworld-node-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            tcpSocket:
              port: 9311
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9311
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: battleworld-data
