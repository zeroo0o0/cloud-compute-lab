apiVersion: apps/v1
kind: Deployment
metadata:
  name: battleworld
  namespace: battleworld
  labels:
    app: battleworld
spec:
  replicas: 1
  selector:
    matchLabels:
      app: battleworld
  template:
    metadata:
      labels:
        app: battleworld
    spec:
      containers:
        - name: server
          image: battleworld:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9310
              name: gateway
            - containerPort: 9311
              name: node-a
            - containerPort: 9312
              name: node-b
            - containerPort: 9313
              name: node-c
          envFrom:
            - configMapRef:
                name: battleworld-config
          readinessProbe:
            tcpSocket:
              port: 9310
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9310
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: battleworld-data
