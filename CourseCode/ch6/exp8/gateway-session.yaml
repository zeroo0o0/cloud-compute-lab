apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  redis_addr: "redis-service:6379"
  game_url: "http://game-service:8081"
  storage_url: "http://storage-service:8082"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage
  labels:
    app: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      containers:
        - name: storage
          image: 10.0.2.12:5000/exp8/exp8-storage:v1
          imagePullPolicy: Always
          command: ["/app/storage"]
          env:
            - name: STORAGE_ADDR
              value: "0.0.0.0:8082"
          ports:
            - name: http
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /get?id=health
              port: 8082
            initialDelaySeconds: 1
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
spec:
  selector:
    app: storage
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game
  labels:
    app: game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: game
  template:
    metadata:
      labels:
        app: game
    spec:
      containers:
        - name: game
          image: 10.0.2.12:5000/exp8/exp8-game:v1
          imagePullPolicy: Always
          command: ["/app/game"]
          env:
            - name: GAME_ADDR
              value: "0.0.0.0:8081"
            - name: STORAGE_URL
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: storage_url
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /player?clientId=health
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
spec:
  selector:
    app: game
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: 10.0.2.12:5000/exp8/redis:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: 10.0.2.12:5000/exp8/exp8-gateway:v1
          imagePullPolicy: Always
          command: ["/app/gateway"]
          env:
            - name: GATEWAY_ADDR
              value: "0.0.0.0:8080"
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: redis_addr
            - name: GAME_URL
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: game_url
          ports:
            - name: tcp
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["/app/gateway", "prestop"]
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: tcp
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service-external
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - name: tcp
      port: 8080
      targetPort: 8080
      nodePort: 30088
