apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  redis_addr: "redis-service:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: 10.0.2.12:5000/exp8/redis:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: 10.0.2.12:5000/exp8/exp8-gateway:v1
          imagePullPolicy: IfNotPresent
          command: ["/app/gateway"]
          env:
            - name: GATEWAY_ADDR
              value: "0.0.0.0:8080"
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: redis_addr
          ports:
            - name: tcp
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: tcp
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service-external
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - name: tcp
      port: 8080
      targetPort: 8080
      nodePort: 30088
