apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage
  namespace: default
  labels:
    app: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      imagePullSecrets:
        - name: test1
      containers:
        - name: storage
          image: ccr.ccs.tencentyun.com/lab4/exp5-storage:v1
          imagePullPolicy: Always
          command: ["/app/storage"]
          env:
            - name: STORAGE_ADDR
              value: "0.0.0.0:8082"
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /get?id=health
              port: 8082
            initialDelaySeconds: 1
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: storage
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game
  namespace: default
  labels:
    app: game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: game
  template:
    metadata:
      labels:
        app: game
    spec:
      imagePullSecrets:
        - name: test1
      containers:
        - name: game
          image: ccr.ccs.tencentyun.com/lab4/exp5-game:v1
          imagePullPolicy: Always
          command: ["/app/game"]
          env:
            - name: GAME_ADDR
              value: "0.0.0.0:8081"
            - name: STORAGE_URL
              value: "http://storage-service:8082"
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /player?clientId=health
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: game
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: default
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      imagePullSecrets:
        - name: test1
      containers:
        - name: gateway
          image: ccr.ccs.tencentyun.com/lab4/exp5-gateway:v1
          imagePullPolicy: Always
          command: ["/app/gateway"]
          env:
            - name: GATEWAY_ADDR
              value: "0.0.0.0:8080"
            - name: GAME_URL
              value: "http://game-service:8081"
          ports:
            - name: tcp
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - name: tcp
      port: 8080
      targetPort: 8080
      protocol: TCP