apiVersion: apps/v1
kind: Deployment
metadata:
  name: faas-runtime
  namespace: exp10
  labels:
    app: faas-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faas-runtime
  template:
    metadata:
      labels:
        app: faas-runtime
    spec:
      containers:
      - name: runtime
        image: crpi-074nws9q0fix3aih.cn-shenzhen.personal.cr.aliyuncs.com/hnu-cloud-compute/ch6-exp10-runtime:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9000
        env:
        - name: PORT
          value: "9000"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
